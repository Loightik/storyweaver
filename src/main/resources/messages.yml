# Customizable player-facing messages for StoryWeaver
# Placeholders: {prefix} {player} {id} {title} {route} {payout} {event} {npc} {option}

en:
  common:
    no-permission: "{prefix}&cNo permission."
    player-only: "{prefix}&cPlayers only."
    unknown-command: "{prefix}&cUnknown subcommand. Use /storyweaver help"
    usage: "{prefix}&eUsage: &f{usage}"
    reloaded: "{prefix}&aReloaded config + messages."
    disabled: "{prefix}&cFeature disabled in config."
  help:
    header: "{prefix}&b/storyweaver &7help"
  admin:
    notify-sent: "{prefix}&aNotify sent."
    sent: "{prefix}&aNotify sent."
    offline: "{prefix}&cPlayer offline."
    watching: "{prefix}&aWatching &f{player}&a."
  discord:
    ok: "{prefix}&aDiscord bridge OK."
    fail: "{prefix}&cDiscord not configured."
  telegram:
    ok: "{prefix}&aTelegram bridge OK."
    fail: "{prefix}&cTelegram not configured."
  grave:
    created: "{prefix}&eGrave &f{id} &ecreated. Recover with /storyweaver recover {id}"
    missing: "{prefix}&cUnknown grave."
    not-yours: "{prefix}&cNot your grave."
    recovered: "{prefix}&aRecovered grave &f{id}&a."
    expired: "{prefix}&cGrave expired."
  contest:
    submitted: "{prefix}&aSubmitted &f{title}&a."
    already-voted: "{prefix}&cAlready voted."
    voted: "{prefix}&aVote counted."
  cargo:
    started: "{prefix}&aContract &f{route}&a accepted."
    none: "{prefix}&cNo active contract."
    delivered: "{prefix}&aDelivered &f{route}&a (+{payout})."
  event:
    broadcast: "{prefix}&6World event: &e{event}"
  story:
    started: "{prefix}&aTalking to &f{npc}&a."
    none: "{prefix}&cNo active dialogue."
    choice: "{prefix}&aChose &f{option}&a."

